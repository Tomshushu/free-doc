# FreeDoc Configuration File
# This file is loaded by the Docker entrypoint script at startup.
# You can map this file to the host machine using: -v /path/to/free-doc.conf:/app/config/free-doc.conf
# Environment variables take priority over this config file.

# ===== Database Configuration =====
# Database type: sqlite (default) or mysql
DB_TYPE=sqlite

# MySQL Configuration (only used when DB_TYPE=mysql)
# MYSQL_HOST=your-mysql-host
# MYSQL_PORT=3306
# MYSQL_DATABASE=your_database
# MYSQL_USER=your_user
# MYSQL_PASSWORD=your_password
# MYSQL_USE_SSL=true

# ===== Server Configuration =====
SERVER_PORT=9200

# ===== JWT Configuration (REQUIRED) =====
# Please set a secure random string of at least 32 characters
# Example: JWT_SECRET=$(openssl rand -base64 48)
JWT_SECRET=dK3dK8kO2dE3bU4hD9uH5tZ7gG5lT6pO8jF9tT8yU8aV3bS1hQ4vU1eI6bI0kO4u

# ===== Default Admin Password =====
# Password for the initial admin account (created on first startup)
DEFAULT_ADMIN_PASSWORD=adminadmin

# ===== Upload Configuration =====
UPLOAD_PATH=./uploads
UPLOAD_MAX_SIZE=52428800
